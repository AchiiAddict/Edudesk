version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: edudesk_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - identity-api
      - support-api
      - learning-api

  identity-api:
    build:
      context: .
      dockerfile: IdentityService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EduDesk_IdentityDb;User=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy

  support-api:
    build:
      context: .
      dockerfile: SupportService/Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EduDesk_SupportDb;User=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  learning-api:
    build:
      context: .
      dockerfile: LearningService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EduDesk_LearningDb;User=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy

  worker-service:
    build:
      context: .
      dockerfile: WorkerService/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: edudesk-sqlserver-1
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    healthcheck:
     test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"YourStrongPassword123!\" -No -Q \"SELECT 1\" || exit 1"]
     interval: 15s
     timeout: 10s
     retries: 10
     start_period: 30s